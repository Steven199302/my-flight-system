<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>航向角解算系统</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="航向解算">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .controls {
            position: fixed; bottom: env(safe-area-inset-bottom, 20px); right: 20px;
            display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
            background: rgba(40, 40, 40, 0.9); padding: 15px; border-radius: 8px;
            border: 1px solid #444; z-index: 999;
        }
        button {
            padding: 12px 20px; cursor: pointer; border: none;
            border-radius: 4px; font-weight: bold; color: white; width: 140px;
            background-color: #3498db; -webkit-tap-highlight-color: transparent;
        }
        #clearBtn { background-color: #555; }
        #headingPanel {
            position: fixed; top: env(safe-area-inset-top, 20px); right: 20px;
            background: rgba(0, 30, 60, 0.9); color: #00ff00;
            padding: 15px; border: 2px solid #3498db; border-radius: 4px;
            width: 200px; display: none; z-index: 1000;
        }
        .bar-bg { height: 4px; background: #222; margin-top: 10px; width: 100%; }
        #timerBar { height: 100%; background: #3498db; width: 0%; transition: width 8s linear; }
    </style>
</head>
<body>

<div id="headingPanel">
    <div style="font-size: 12px; color: #3498db;">航向角解算 (RTB)</div>
    <div id="headingValue" style="font-size: 32px; margin: 10px 0; font-weight: bold;">---°</div>
    <div class="bar-bg"><div id="timerBar"></div></div>
</div>

<div class="controls">
    <div id="statusInfo" style="color:#3498db; font-size:12px; margin-bottom:5px;">系统就绪</div>
    <button id="startBtn">开始生成</button>
    <button id="clearBtn">清空屏幕</button>
</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusInfo = document.getElementById('statusInfo');
    const headingPanel = document.getElementById('headingPanel');
    const headingValue = document.getElementById('headingValue');
    const timerBar = document.getElementById('timerBar');

    let houseList = []; 
    let stoppedArrows = []; 
    let activeArrow = null;
    let finalResult = "";

    const UI_WIDTH_BUFFER = 280; 
    const EDGE_PADDING = 60;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawHouse(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "#fff"; ctx.fillRect(-15, 0, 30, 30);
        ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(0, -15); ctx.lineTo(20, 0);
        ctx.fillStyle = "#f00"; ctx.fill();
        ctx.restore();
    }

    function drawArrow(x, y, angle, color, glow) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(15, 0); ctx.lineTo(-10, -10); ctx.lineTo(-6, 0); ctx.lineTo(-10, 10); ctx.closePath();
        ctx.fillStyle = color;
        if(glow) { ctx.shadowBlur = 15; ctx.shadowColor = color; }
        ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
        ctx.restore();
    }

    function clearScreen() {
        houseList = [];
        stoppedArrows = [];
        activeArrow = null;
        finalResult = "";
        headingPanel.style.display = 'none';
        statusInfo.textContent = "屏幕已刷新";
    }

    document.getElementById('startBtn').onclick = () => {
        if (activeArrow) return;
        clearScreen();
        const safeWidth = canvas.width - UI_WIDTH_BUFFER;
        const safeHeight = canvas.height - (EDGE_PADDING * 2);

        const h = {
            x: Math.random() * (safeWidth - EDGE_PADDING) + EDGE_PADDING,
            y: Math.random() * safeHeight + EDGE_PADDING
        };
        houseList.push(h);

        activeArrow = {
            x: Math.random() * (safeWidth - EDGE_PADDING) + EDGE_PADDING,
            y: Math.random() * safeHeight + EDGE_PADDING,
            angle: Math.random() * Math.PI * 2,
            speed: 5,
            stopTime: Date.now() + (Math.random() * 2000 + 2000),
            nextTurn: Date.now() + 800,
            target: h
        };

        headingPanel.style.display = 'block';
        headingValue.textContent = "计算中...";
        timerBar.style.transition = 'none';
        timerBar.style.width = '0%';
        
        setTimeout(() => {
            timerBar.style.transition = 'width 8s linear';
            timerBar.style.width = '100%';
        }, 50);

        statusInfo.textContent = "巡航中...";

        setTimeout(() => {
            if (finalResult) {
                headingValue.textContent = finalResult + "°";
                statusInfo.textContent = "解算完成";
            }
        }, 8000); 
    };

    document.getElementById('clearBtn').onclick = clearScreen;

    function mainLoop() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        houseList.forEach(h => drawHouse(h.x, h.y));
        stoppedArrows.forEach(a => drawArrow(a.x, a.y, a.angle, "#3498db", false));

        if (activeArrow) {
            const a = activeArrow;
            const safeWidth = canvas.width - UI_WIDTH_BUFFER;
            if (Date.now() < a.stopTime) {
                if (Date.now() > a.nextTurn) {
                    a.angle += (Math.random() - 0.5) * Math.PI;
                    a.nextTurn = Date.now() + 1000;
                }
                a.x += Math.cos(a.angle) * a.speed;
                a.y += Math.sin(a.angle) * a.speed;
                if (a.x < 20 || a.x > safeWidth) a.angle = Math.PI - a.angle;
                if (a.y < 20 || a.y > canvas.height - 20) a.angle = -a.angle;
                drawArrow(a.x, a.y, a.angle, "#fff", true);
            } else {
                const dx = a.target.x - a.x;
                const dy = a.target.y - a.y;
                let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
                if (angle < 0) angle += 360;
                finalResult = angle.toFixed(1);
                stoppedArrows.push({x: a.x, y: a.y, angle: a.angle});
                activeArrow = null;
                statusInfo.textContent = "等待解算发布...";
            }
        }
        requestAnimationFrame(mainLoop);
    }
    mainLoop();
</script>
</body>

</html>
